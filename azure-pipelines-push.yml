  # displayName: 'Notify Slack'
  # condition: >
  #   and(
  #     always(),
  #     eq(variables['System.CollectionUri'], 'https://dev.azure.com/mhclg/')
  #   )
- script: |
    PIPELINE_URL="$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
    ARTIFACT_URL="${PIPELINE_URL}&view=artifacts"

    for f in pipaudit_reports/*.txt; do
      team_name=$(basename "$f" .txt)

      if [ -s "$f" ]; then
        TABLE=$(printf '```\n%-30s %-15s %-20s\n%-30s %-15s %-20s\n%s\n```' \
          "Package" "CVE ID" "Fix Version" \
          "-------" "------" "-----------" \
          "$(tail -n +3 "$f" | awk '{printf "%-30s %-15s %-20s\n", $1, $2, $3}')")
        MESSAGE="🚨 Daily Private Package Security Scan failed for ${team_name}! Pip audit output:\n${TABLE}\n<${PIPELINE_URL}|Pipeline> | <${ARTIFACT_URL}|Scan Artifact>"
      else
        MESSAGE="✅ Daily Private Package Security Scan succeeded for ${team_name}! Check the details and logs here: <${PIPELINE_URL}|Pipeline> | <${ARTIFACT_URL}|Scan Artifact>"
      fi

      curl -X POST -H 'Content-type: application/json' \
        --data "{\"text\": \"$MESSAGE\"}" \
        $(slack_webhook_url)
    done
  displayName: 'Notify Slack'
  condition: >
    and(
      always(),
      eq(variables['System.CollectionUri'], 'https://dev.azure.com/dluhctst/')
    )