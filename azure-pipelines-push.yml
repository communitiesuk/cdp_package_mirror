trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

schedules:
  - cron: "0 7 * * *"
    displayName: Run Scan Every Day at 7am
    branches:
      include:
        - main
    always: true

variables:
  - group: core-cdp-vars

steps:
# checkout current repository onto the build agent
- checkout: self
  fetchDepth: 0

# use Python version 3.12
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.12'

# install pip-audit for subsequent scanning step
- script: pip install pip-audit
  displayName: Install pip-audit

# run pip-audit scan and generate security report
- script: |
    set -euo pipefail

    OUT_DIR=pipaudit_reports

    mkdir -p "$OUT_DIR"
    mkdir -p $(Pipeline.Workspace)/multi_team_reports
    # Ensure pipaudit exists
    python -m pip install -q --upgrade pip
    python -m pip install -q pip-audit

    shopt -s nullglob

    for f in requirements/*.txt; do
      team_name="$(basename "$f" .txt)"
      echo "== Auditing: $team_name =="

      ignored_vulns=$(jq --arg team_name "$team_name" 'map(select(.team==$team_name)) | map("--ignore-vuln " + .vulnerability_id) | join(" ")' -r  accepted_vulns.json)

      echo "Ignored: $ignored_vulns"
      # JSON output (easier to post-process)
      pip-audit -r "$f" $ignored_vulns | tee "$OUT_DIR/${team_name}.txt" || true
      pip-audit -r "$f" -f json $ignored_vulns > "$OUT_DIR/${team_name}.json" || true
    done

  displayName: Run pip-audit and generate report

# publish security report json to pipeline artifact
- task: PublishPipelineArtifact@1
  displayName: Publish pip-audit report
  inputs:
    targetPath: pipaudit_reports 
    artifact: multi_team_reports
    publishLocation: 'pipeline'

- script: |
    set -o pipefail
    for f in pipaudit_reports/*.txt; do
      if [ -s $f ]; then
        echo "$f has vulnerabilities"
        exit 1
      fi
    done

  displayName: Enforce security gate and capture output

